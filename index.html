<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantrax Roster Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div style="width:10px;height:10px;border-radius:50%;background:#c41e3a;box-shadow:0 0 8px #c41e3a"></div>
  <h1>Keeper League Roster Viewer</h1>
  <div class="header-actions">
    <a href="power-rankings.html" class="header-link">Power Rankings</a>
    <span id="period-label">Loading...</span>
  </div>
</header>

<div class="controls">
  <label for="team-filter">Team</label>
  <select id="team-filter">
    <option value="">All Teams</option>
  </select>

  <label for="pos-filter">Position</label>
  <select id="pos-filter">
    <option value="">All Positions</option>
    <option value="P">P</option>
    <option value="C">C</option>
    <option value="1B">1B</option>
    <option value="2B">2B</option>
    <option value="3B">3B</option>
    <option value="SS">SS</option>
    <option value="OF">OF</option>
    <option value="UT">UT</option>
  </select>

  <label for="status-filter">Status</label>
  <select id="status-filter">
    <option value="">Active + Reserve</option>
    <option value="ACTIVE">Active only</option>
    <option value="RESERVE">Reserve only</option>
  </select>

  <label for="search">Search</label>
  <input id="search" type="text" placeholder="Player name..." />

  <div class="pill" id="total-pill">Total: <span id="total-count">—</span> players</div>
</div>

<div id="error-msg"></div>

<main id="grid">
  <div id="loading">Loading roster data...</div>
</main>

<script src="script.js"></script>
</body>
</html>
