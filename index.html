<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantrax Roster Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e, #252b3b);
      border-bottom: 2px solid #2e7d32;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    header span {
      font-size: 0.85rem;
      color: #aaa;
      margin-left: auto;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      background: #13161f;
      border-bottom: 1px solid #1e2233;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.85rem;
      color: #aaa;
      margin-right: 4px;
    }

    .controls select, .controls input {
      background: #1e2233;
      border: 1px solid #2e3550;
      color: #e0e0e0;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    .controls select:focus, .controls input:focus {
      border-color: #2e7d32;
    }

    .controls input { width: 200px; }

    .pill {
      background: #1e2233;
      border: 1px solid #2e3550;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      color: #aaa;
    }

    .pill span { color: #4caf50; font-weight: 600; }

    main {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }

    .team-card {
      background: #1a1f2e;
      border: 1px solid #2e3550;
      border-radius: 10px;
      overflow: hidden;
    }

    .team-header {
      background: linear-gradient(135deg, #1e2a1a, #1a2e1e);
      border-bottom: 2px solid #2e7d32;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-name {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }

    .team-count {
      font-size: 0.78rem;
      color: #81c784;
      background: rgba(46,125,50,0.18);
      padding: 2px 10px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: #13161f;
    }

    thead th {
      padding: 7px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #777;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid #1e2233;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #202538; }

    tbody tr.reserve { opacity: 0.6; }

    tbody td {
      padding: 8px 12px;
      font-size: 0.88rem;
    }

    .pos-badge {
      display: inline-block;
      background: #1e2233;
      border: 1px solid #2e3550;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #90caf9;
      min-width: 32px;
      text-align: center;
    }

    .pos-badge.P  { background: #1a2636; border-color: #1565c0; color: #64b5f6; }
    .pos-badge.C  { background: #2a1a36; border-color: #6a1b9a; color: #ce93d8; }
    .pos-badge.1B { background: #1a2e1a; border-color: #1b5e20; color: #a5d6a7; }
    .pos-badge.2B { background: #1a2e1a; border-color: #1b5e20; color: #a5d6a7; }
    .pos-badge.3B { background: #1a2e1a; border-color: #1b5e20; color: #a5d6a7; }
    .pos-badge.SS { background: #1a2e1a; border-color: #1b5e20; color: #a5d6a7; }
    .pos-badge.OF { background: #2e261a; border-color: #e65100; color: #ffcc80; }
    .pos-badge.UT { background: #2a2a1a; border-color: #f57f17; color: #fff176; }
    .pos-badge.DH { background: #2a2a1a; border-color: #f57f17; color: #fff176; }

    .player-name { color: #e8e8e8; }
    .player-name.reserve-label { color: #888; }

    .mlb-team {
      color: #aaa;
      font-size: 0.82rem;
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .status-badge.ACTIVE  { background: rgba(46,125,50,0.2); color: #66bb6a; border: 1px solid #2e7d32; }
    .status-badge.RESERVE { background: rgba(80,80,80,0.2);  color: #888;    border: 1px solid #444; }

    .section-divider {
      background: #13161f;
      text-align: left;
      padding: 5px 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      border-bottom: 1px solid #1e2233;
    }

    #loading {
      text-align: center;
      padding: 80px;
      color: #555;
      font-size: 1.1rem;
      grid-column: 1 / -1;
    }

    #error-msg {
      display: none;
      background: #2e1a1a;
      border: 1px solid #b71c1c;
      color: #ef9a9a;
      padding: 16px 24px;
      border-radius: 8px;
      margin: 24px 32px;
    }
  </style>
</head>
<body>

<header>
  <div style="width:10px;height:10px;border-radius:50%;background:#4caf50;box-shadow:0 0 8px #4caf50"></div>
  <h1>Fantrax Roster Viewer</h1>
  <span id="period-label">Loading...</span>
</header>

<div class="controls">
  <label for="team-filter">Team</label>
  <select id="team-filter">
    <option value="">All Teams</option>
  </select>

  <label for="pos-filter">Position</label>
  <select id="pos-filter">
    <option value="">All Positions</option>
    <option value="P">P</option>
    <option value="C">C</option>
    <option value="1B">1B</option>
    <option value="2B">2B</option>
    <option value="3B">3B</option>
    <option value="SS">SS</option>
    <option value="OF">OF</option>
    <option value="UT">UT</option>
  </select>

  <label for="status-filter">Status</label>
  <select id="status-filter">
    <option value="">Active + Reserve</option>
    <option value="ACTIVE">Active only</option>
    <option value="RESERVE">Reserve only</option>
  </select>

  <label for="search">Search</label>
  <input id="search" type="text" placeholder="Player name..." />

  <div class="pill" id="total-pill">Total: <span id="total-count">—</span> players</div>
</div>

<div id="error-msg"></div>

<main id="grid">
  <div id="loading">Loading roster data...</div>
</main>

<script>
  async function loadData() {
    const [rostersResp, playersResp] = await Promise.all([
      fetch('fantrax_rosters.json'),
      fetch('fantrax_players.json')
    ]);
    const rosters = await rostersResp.json();
    const players = await playersResp.json();
    return { rosters, players };
  }

  function render(rosters, players, teamFilter, posFilter, statusFilter, search) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    let totalPlayers = 0;
    const searchLower = search.toLowerCase();

    for (const [teamId, teamData] of Object.entries(rosters.rosters)) {
      if (teamFilter && teamId !== teamFilter) continue;

      const active = [];
      const reserve = [];

      for (const item of teamData.rosterItems) {
        const pinfo = players[item.id] || {};
        const name = pinfo.name || `Unknown (${item.id})`;
        const mlbTeam = pinfo.team || '?';

        if (posFilter && item.position !== posFilter) continue;
        if (statusFilter && item.status !== statusFilter) continue;
        if (searchLower && !name.toLowerCase().includes(searchLower)) continue;

        const row = { id: item.id, name, mlbTeam, position: item.position, status: item.status };
        if (item.status === 'ACTIVE') active.push(row);
        else reserve.push(row);
      }

      const all = [...active, ...reserve];
      if (all.length === 0) continue;

      totalPlayers += all.length;

      const card = document.createElement('div');
      card.className = 'team-card';

      card.innerHTML = `
        <div class="team-header">
          <div class="team-name">${teamData.teamName}</div>
          <div class="team-count">${all.length} players</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Player</th>
              <th>MLB</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tbody-${teamId}"></tbody>
        </table>
      `;

      grid.appendChild(card);

      const tbody = card.querySelector(`#tbody-${teamId}`);

      function addRows(rows, isReserve) {
        if (rows.length === 0) return;
        if (isReserve && active.length > 0) {
          const divRow = document.createElement('tr');
          divRow.innerHTML = `<td colspan="4" class="section-divider">Reserve</td>`;
          tbody.appendChild(divRow);
        }
        for (const p of rows) {
          const tr = document.createElement('tr');
          if (isReserve) tr.classList.add('reserve');
          tr.innerHTML = `
            <td><span class="pos-badge ${p.position}">${p.position}</span></td>
            <td class="player-name ${isReserve ? 'reserve-label' : ''}">${p.name}</td>
            <td class="mlb-team">${p.mlbTeam}</td>
            <td><span class="status-badge ${p.status}">${p.status}</span></td>
          `;
          tbody.appendChild(tr);
        }
      }

      addRows(active, false);
      addRows(reserve, true);
    }

    document.getElementById('total-count').textContent = totalPlayers;

    if (grid.children.length === 0) {
      grid.innerHTML = '<div id="loading" style="color:#555">No matching players found.</div>';
    }
  }

  (async () => {
    try {
      const { rosters, players } = await loadData();

      document.getElementById('period-label').textContent = `Period ${rosters.period}`;

      const teamSelect = document.getElementById('team-filter');
      for (const [id, data] of Object.entries(rosters.rosters)) {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = data.teamName;
        teamSelect.appendChild(opt);
      }

      function rerender() {
        render(
          rosters, players,
          document.getElementById('team-filter').value,
          document.getElementById('pos-filter').value,
          document.getElementById('status-filter').value,
          document.getElementById('search').value
        );
      }

      document.getElementById('team-filter').addEventListener('change', rerender);
      document.getElementById('pos-filter').addEventListener('change', rerender);
      document.getElementById('status-filter').addEventListener('change', rerender);
      document.getElementById('search').addEventListener('input', rerender);

      rerender();
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      const errDiv = document.getElementById('error-msg');
      errDiv.style.display = 'block';
      errDiv.textContent = `Failed to load data: ${err.message}. Make sure to serve this file with a local web server (e.g. "python3 -m http.server 8080").`;
    }
  })();
</script>
</body>
</html>
