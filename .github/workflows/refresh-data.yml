name: Refresh League Data

on:
  schedule:
    # Every 6 hours during baseball season
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch data and generate rankings
        env:
          FANTRAX_LEAGUE_ID: ${{ secrets.FANTRAX_LEAGUE_ID }}
          FANTRAX_COOKIE: ${{ secrets.FANTRAX_COOKIE }}
        run: node scripts/refresh-data.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh league data [skip ci]"
            git push
          fi
